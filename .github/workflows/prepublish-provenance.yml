name: Pre-publication Provenance Gate

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-provenance:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
      - name: Require verified third-party source revisions
        run: node desktop/tests/scripts/assert-third-party-provenance.mjs --require-verified
