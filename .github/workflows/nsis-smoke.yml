name: NSIS Bundle Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: nsis-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nsis-bundle-smoke:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RUST_TARGET: x86_64-pc-windows-msvc
      RUST_TOOLCHAIN: stable
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.RUST_TARGET }}
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_TOOLCHAIN }}-${{ env.RUST_TARGET }}-nsis-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'desktop/src-tauri/Cargo.toml', 'desktop/src-tauri/src/**', 'desktop/src-tauri/tauri.conf.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_TOOLCHAIN }}-${{ env.RUST_TARGET }}-nsis-
      - run: pnpm install --frozen-lockfile
      - name: Verify release-evidence configuration
        run: node --test ./tests/scripts/release-evidence.test.mjs
      - name: Verify recorded third-party provenance integrity
        run: node ./tests/scripts/assert-third-party-provenance.mjs
      - name: Build NSIS bundle
        run: pnpm tauri build --bundles nsis
      - name: Install, launch, verify notices, and uninstall
        shell: pwsh
        run: ./tests/scripts/smoke-nsis.ps1
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: nsis-smoke-${{ github.run_id }}
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            desktop/tests/results/nsis-smoke/**
          if-no-files-found: ignore
          retention-days: 7
