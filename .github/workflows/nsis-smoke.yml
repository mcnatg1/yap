name: NSIS Bundle Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: nsis-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nsis-bundle-smoke:
    runs-on: windows-2025
    timeout-minutes: 60
    env:
      RUST_TARGET: x86_64-pc-windows-msvc
      RUST_TOOLCHAIN: 1.96.0
    defaults:
      run:
        shell: pwsh
        working-directory: desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify PowerShell 7.4 Core
        shell: pwsh
        run: |
          if ($PSVersionTable.PSEdition -cne "Core" -or $PSVersionTable.PSVersion -lt [version]"7.4") {
            throw "NSIS smoke requires PowerShell Core 7.4 or newer."
          }
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.RUST_TARGET }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_TOOLCHAIN }}-${{ env.RUST_TARGET }}-nsis-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'desktop/src-tauri/Cargo.toml', 'desktop/src-tauri/src/**', 'desktop/src-tauri/tauri.conf.json') }}
      - run: pnpm install --frozen-lockfile
      - name: Verify release-evidence configuration
        run: pnpm test:release-contract
      - name: Verify recorded third-party provenance integrity
        run: node ./tests/scripts/assert-third-party-provenance.mjs
      - name: Build NSIS bundle
        run: pnpm tauri build --bundles nsis
      - name: Install, launch, verify notices, and uninstall
        shell: pwsh
        run: ./tests/scripts/smoke-nsis-production-delete.ps1
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: nsis-smoke-${{ github.run_id }}
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            desktop/tests/results/nsis-smoke/**
          if-no-files-found: ignore
          retention-days: 7
