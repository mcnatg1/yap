name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - uses: actions/cache@v6
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('desktop/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: frontend-test-artifacts
          path: |
            desktop/test-results
            desktop/playwright-report
          if-no-files-found: ignore

  rust:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
            desktop/src-tauri/.cargo-tools/
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked
      - name: cargo audit
        run: |
          $env:PATH = "$PWD\.cargo-tools\bin;$env:PATH"
          if (-not (Test-Path ".cargo-tools\bin\cargo-audit.exe")) {
            cargo install cargo-audit --locked --root .cargo-tools
          }
          # Policy: cargo-audit warnings from Tauri's target-all desktop
          # transitive crates are allowed for now. Unignored vulnerabilities must
          # fail CI; every ignore below needs a removal condition in docs.
          # quick-xml is pulled transitively through tauri-utils -> plist.
          # Remove these ignores once plist can move to quick-xml >=0.41.
          cargo audit --target-os windows --target-arch x86_64 `
            --ignore RUSTSEC-2026-0194 `
            --ignore RUSTSEC-2026-0195

  native-wdio:
    name: Native WDIO smoke (required, no hardware)
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-native-wdio-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'desktop/src-tauri/Cargo.toml', 'desktop/src-tauri/src/**', 'desktop/src-tauri/tauri*.json') }}
          restore-keys: |
            ${{ runner.os }}-native-wdio-
            ${{ runner.os }}-cargo-
      - run: pnpm install --frozen-lockfile
      - name: Verify release-evidence configuration
        run: node --test ./tests/scripts/release-evidence.test.mjs
      - name: Build the WDIO-enabled app once
        run: pnpm test:desktop:build
      - name: Run required hardware-independent WDIO specs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tests/results | Out-Null
          & pnpm exec wdio run ./tests/wdio.required.conf.ts 2>&1 |
            Tee-Object -FilePath tests/results/native-wdio-trace.log
          $wdioExitCode = $LASTEXITCODE
          if ($wdioExitCode -ne 0) {
            exit $wdioExitCode
          }
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: native-wdio-failure-${{ github.run_id }}
          path: desktop/tests/results
          if-no-files-found: warn
          retention-days: 7

  server:
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: server/src
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m unittest discover -s server/tests -p "test_*.py"
