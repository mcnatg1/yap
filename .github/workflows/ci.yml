name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      POWERSHELL_74_SHA256: 266479A93B82CD0DC0F043419388FD4A738A51082821C301FFF497212FAF6760
      POWERSHELL_74_VERSION: 7.4.17
      POWERSHELL_TELEMETRY_OPTOUT: "1"
    defaults:
      run:
        shell: pwsh
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7
      - name: Verify PowerShell 7.4 Core
        shell: pwsh
        run: |
          if ($PSVersionTable.PSEdition -cne "Core" -or $PSVersionTable.PSVersion -lt [version]"7.4") {
            throw "CI requires PowerShell Core 7.4 or newer."
          }
      - name: Install pinned PowerShell 7.4 runtime
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "PowerShell-$env:POWERSHELL_74_VERSION-win-x64.zip"
          $runtimeRoot = Join-Path $env:RUNNER_TEMP "powershell-$env:POWERSHELL_74_VERSION"
          $uri = "https://github.com/PowerShell/PowerShell/releases/download/v$env:POWERSHELL_74_VERSION/PowerShell-$env:POWERSHELL_74_VERSION-win-x64.zip"
          Invoke-WebRequest -Uri $uri -OutFile $archive
          $actualSha256 = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash
          if ($actualSha256 -cne $env:POWERSHELL_74_SHA256) {
            throw "Pinned PowerShell archive hash mismatch."
          }
          Expand-Archive -LiteralPath $archive -DestinationPath $runtimeRoot -Force
          $runtime = Join-Path $runtimeRoot "pwsh.exe"
          if (-not (Test-Path -LiteralPath $runtime -PathType Leaf)) {
            throw "Pinned PowerShell runtime was not extracted."
          }
          "YAP_POWERSHELL_74=$runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $runtimeRoot | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run focused suite under PowerShell 7.4
        run: |
          $identityJson = & $env:YAP_POWERSHELL_74 -NoProfile -NonInteractive -Command '[ordered]@{ PSEdition = $PSVersionTable.PSEdition; PSVersion = $PSVersionTable.PSVersion.ToString() } | ConvertTo-Json -Compress'
          if ($LASTEXITCODE -ne 0) { throw "Pinned PowerShell identity probe failed." }
          $identity = $identityJson | ConvertFrom-Json
          if ($identity.PSEdition -cne "Core" -or [version]$identity.PSVersion -ne [version]$env:POWERSHELL_74_VERSION) {
            throw "Pinned PowerShell runtime identity does not match the compatibility lane."
          }

          $nestedRuntime = & $env:YAP_POWERSHELL_74 -NoProfile -NonInteractive -Command '(Get-Command pwsh.exe -CommandType Application | Select-Object -First 1).Source'
          if ($LASTEXITCODE -ne 0 -or [System.IO.Path]::GetFullPath($nestedRuntime) -ine [System.IO.Path]::GetFullPath($env:YAP_POWERSHELL_74)) {
            throw "Nested PowerShell commands do not resolve to the pinned compatibility runtime."
          }

          $parserProbe = @'
          $ErrorActionPreference = "Stop"
          $files = @(git ls-files -- "*.ps1" "*.psm1")
          if ($files.Count -eq 0) { throw "No tracked PowerShell files were found." }
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $file).Path,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$file failed PowerShell 7.4 parsing: $($errors.Message -join '; ')"
            }
          }
          '@
          & $env:YAP_POWERSHELL_74 -NoProfile -NonInteractive -Command $parserProbe
          if ($LASTEXITCODE -ne 0) { throw "Tracked scripts failed PowerShell 7.4 parsing." }
          & $env:YAP_POWERSHELL_74 -NoProfile -NonInteractive -File ./tests/scripts/nsis-smoke-helpers.test.ps1
          if ($LASTEXITCODE -ne 0) { throw "Focused PowerShell 7.4 helper suite failed." }
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - uses: actions/cache@v6
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('desktop/pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - run: pnpm test:release-contract
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: frontend-test-artifacts
          path: |
            desktop/tests/results/playwright
          if-no-files-found: warn

  rust:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v7
      - name: Verify PowerShell 7.4 Core
        shell: pwsh
        run: |
          if ($PSVersionTable.PSEdition -cne "Core" -or $PSVersionTable.PSVersion -lt [version]"7.4") {
            throw "CI requires PowerShell Core 7.4 or newer."
          }
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked
      - name: contract connector integration
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD\server\src"
          $env:YAP_SERVER_HOST = "127.0.0.1"
          $env:YAP_SERVER_PORT = "18765"
          $server = Start-Process python -ArgumentList "-m", "yap_server" -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 20; $attempt++) {
              try {
                Invoke-RestMethod "http://127.0.0.1:18765/v1/health" | Out-Null
                $ready = $true
                break
              } catch {
                Start-Sleep -Milliseconds 500
              }
            }
            if (-not $ready) { throw "Yap server health did not become ready" }
            $env:YAP_TEST_SERVER_URL = "http://127.0.0.1:18765"
            cargo test --locked --manifest-path .\desktop\src-tauri\Cargo.toml --test server_connector
            if ($LASTEXITCODE -ne 0) { throw "server connector integration failed" }
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
          }
      - name: cargo audit
        run: |
          $env:PATH = "$PWD\.cargo-tools\bin;$env:PATH"
          if (-not (Test-Path ".cargo-tools\bin\cargo-audit.exe")) {
            cargo install cargo-audit --locked --root .cargo-tools
          }
          # Policy: cargo-audit warnings from Tauri's target-all desktop
          # transitive crates are allowed for now. Vulnerabilities fail CI.
          cargo audit --target-os windows --target-arch x86_64

  native-wdio:
    name: Native WDIO smoke (required, no hardware)
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      RUST_TARGET: x86_64-pc-windows-msvc
      RUST_TOOLCHAIN: stable
    defaults:
      run:
        shell: pwsh
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7
      - name: Verify PowerShell 7.4 Core
        shell: pwsh
        run: |
          if ($PSVersionTable.PSEdition -cne "Core" -or $PSVersionTable.PSVersion -lt [version]"7.4") {
            throw "CI requires PowerShell Core 7.4 or newer."
          }
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.RUST_TARGET }}
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_TOOLCHAIN }}-${{ env.RUST_TARGET }}-native-wdio-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'desktop/src-tauri/Cargo.toml', 'desktop/src-tauri/src/**', 'desktop/src-tauri/tauri*.json') }}
      - run: pnpm install --frozen-lockfile
      - name: Verify release-evidence configuration
        run: pnpm test:release-contract
      - name: Build the WDIO-enabled app once
        run: pnpm test:desktop:build
      - name: Run required hardware-independent WDIO specs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tests/results | Out-Null
          & pnpm exec wdio run ./tests/wdio.required.conf.ts 2>&1 |
            Tee-Object -FilePath tests/results/native-wdio-run.log
          $wdioExitCode = $LASTEXITCODE
          if ($wdioExitCode -ne 0) {
            exit $wdioExitCode
          }
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: native-wdio-failure-${{ github.run_id }}
          path: desktop/tests/results
          if-no-files-found: warn
          retention-days: 7

  server:
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: server/src
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Verify PowerShell 7.4 Core
        shell: pwsh
        run: |
          if ($PSVersionTable.PSEdition -cne "Core" -or $PSVersionTable.PSVersion -lt [version]"7.4") {
            throw "CI requires PowerShell Core 7.4 or newer."
          }
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m unittest discover -s server/tests -p "test_*.py"
